services:
  mysql:
    image: mysql:8.0
    container_name: adoteja-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=db_adoteja
      - MYSQL_USER=warley
      - MYSQL_PASSWORD=12345678
    volumes:
      - adoteja-mysql-data:/var/lib/mysql

  localstack:
    image: localstack/localstack:3.8.0
    container_name: adoteja-localstack
    ports:
      - "4566:4566"
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_HOST=localhost
    volumes:
      - "./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"

volumes:
  adoteja-mysql-data:
